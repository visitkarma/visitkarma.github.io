# Change baseurl before deploy
baseurl      = "https://visitkarma.github.io/"
languageCode = "en-us"
title        = "Visit Karma"
description  = "A city-dwelling family that enjoys luxury travel and outdoor adventures"

# Theme i18n support
# See all available values at https://github.com/CaiJimmy/hugo-theme-stack/tree/master/i18n
defaultContentLanguage = "en"

# Set hasCJKLanguage to true if DefaultContentLanguage is in [zh-cn ja ko]
# This will make .Summary and .WordCount behave correctly for CJK languages.
hasCJKLanguage = false

# Change it to your Disqus shortname before using
disqusShortname = "visit-karma"

googleAnalytics = "G-56B1YH0DJ5"

[pagination]
    pagerSize = 5
